<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧱 Lego Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & TOKENS ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  --bg:        #fff9e0;   /* jaune très clair pour fond général */
  --surface:   #ffffff;   /* cartes */
  --surface2:  #fff4b3;   /* jaune un peu plus soutenu pour éléments secondaires */
  --border:    #ffe066;   /* jaune moyen pour les bordures */

  --accent:    #ffcf00;   /* LEGO yellow vif */
  --accent2:   #e3000b;   /* rouge LEGO pour actions */
  --accent3:   #0055bf;   /* bleu */

  --text:      #1a1a1a;
  --muted:     #6b6b6b;

  --radius:    10px;

  --font-head: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent3); }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
   header {
  background: var(--accent); /* barre toute jaune */
  border-bottom: none;       /* supprime la bordure si tu veux */
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}

header h1 {
  font-family: var(--font-head);
  font-size: 2.8rem;
  letter-spacing: 3px;
  color: var(--accent2);     /* texte rouge LEGO */
  line-height: 1;
}

header p {
  color: #1a1a1a;            /* texte noir pour sous-titre */
  font-size: 13px;
  margin-top: 4px;
}

    /* ── LAYOUT ─────────────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      min-height: calc(100vh - 80px);
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .sidebar-section h3 {
      font-family: var(--font-head);
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    /* ── CONTROLS ────────────────────────────────────────────────────────── */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: border-color .2s;
    }

    select:focus { outline: none; border-color: var(--accent); }

    /* ── FILTER BUTTONS ──────────────────────────────────────────────────── */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent3); }
    .filter-btn.active { background: var(--accent2); color: #000; border-color: var(--accent2); font-weight: 600; }
 
    /* ── PAGINATION ──────────────────────────────────────────────────────── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 32px;
  padding-bottom: 32px;
}

.page-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 18px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text);
  transition: all .2s;
}

.page-btn:hover:not(:disabled) {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.page-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.page-numbers {
  display: flex;
  gap: 6px;
}

.page-num {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text);
  transition: all .2s;
  min-width: 40px;
  text-align: center;
}

.page-num:hover {
  background: var(--surface2);
  border-color: var(--accent);
}

.page-num.active {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}

    /* ── MAIN ────────────────────────────────────────────────────────────── */
    main {
  padding: 28px 32px;
  overflow-y: auto;
}

#deals {
  background: var(--surface);
  margin: 40px -32px -28px -32px;
  padding: 32px;
  border-top: 1px solid var(--border);
}


    /* ── INDICATORS ──────────────────────────────────────────────────────── */
.indicators-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
  overflow-x: auto;
}

.indicator-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
  min-width: 120px;
}

.indicator-card .label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.indicator-card .value {
  font-family: var(--font-head);
  font-size: 1.5rem;
  color: var(--accent2);
  letter-spacing: 1px;
}

    /* ── VINTED SECTION ──────────────────────────────────────────────────── */
    .vinted-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .vinted-header h2 {
      font-family: var(--font-head);
      font-size: 1.4rem;
      letter-spacing: 2px;
    }

    .lego-id-select { max-width: 180px; }

    /* ── DEALS SECTION ───────────────────────────────────────────────────── */
    .deals-header {
      font-family: var(--font-head);
      font-size: 1.4rem;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .deals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    /* ── DEAL CARD ───────────────────────────────────────────────────────── */
    .deal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color .2s, transform .2s;
      animation: fadeUp .3s ease both;
    }

    .deal-card:hover { border-color: var(--accent3); transform: translateY(-2px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .deal-photo {
      height: 160px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .deal-photo img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .no-photo { font-size: 3rem; }

    .deal-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .deal-badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .badge.discount { background: var(--accent); color: #000; }
    .badge.temp     { background: #ff6b35; color: #fff; }
    .badge.comments { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .deal-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .deal-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .deal-price  { font-family: var(--font-head); font-size: 1.1rem; color: var(--accent3); }
    .deal-retail { font-size: 12px; color: var(--muted); text-decoration: line-through; }
    .deal-date   { font-size: 11px; color: var(--muted); margin-left: auto; }
    .deal-community {
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── FAV BUTTON ──────────────────────────────────────────────────────── */
    .fav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .fav-btn:hover,
.fav-btn.active {
  background: var(--accent); /* rouge LEGO */
  color: var(--accent2);        /* étoile jaune */
  border-color: var(--accent);
}

    /* ── SALE CARD ───────────────────────────────────────────────────────── */
    .sales-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }

    .sale-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      transition: border-color .2s;
    }

    .sale-card:hover { border-color: var(--accent); }
    .sale-title { font-size: 12px; line-height: 1.4; margin-bottom: 8px; }
    .sale-meta  { display: flex; justify-content: space-between; align-items: center; }
    .sale-price { font-family: var(--font-head); font-size: 1rem; color: var(--accent3); }
    .sale-date  { font-size: 11px; color: var(--muted); }

    /* ── EMPTY STATE ─────────────────────────────────────────────────────── */
    .empty { color: var(--muted); font-size: 13px; padding: 20px 0; }

    /* ── DIVIDER ─────────────────────────────────────────────────────────── */
    .section-divider {
  display: none;
  }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Lego Deals</h1>
      <p>Invest in Lego</p>
    </div>
  </header>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-section">
        <h3>Display</h3>
        <div class="control-group">
          <label for="show-select">Deals per page</label>
          <select id="show-select">
            <option value="6">6</option>
            <option value="12">12</option>
            <option value="24">24</option>
          </select>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Sort</h3>
        <div class="control-group">
          <label for="sort-select">Sort by</label>
          <select id="sort-select">
            <option value="">— None —</option>
            <option value="price-asc">Price: low → high</option>
            <option value="price-desc">Price: high → low</option>
            <option value="date-asc">Date: old → recent</option>
            <option value="date-desc">Date: recent → old</option>
          </select>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Filters</h3>
        <div class="filter-group">
          <button class="filter-btn" data-filter="discount">🔥 Best discount (&gt;50%)</button>
          <button class="filter-btn" data-filter="commented">💬 Most commented (&gt;15)</button>
          <button class="filter-btn" data-filter="hot">🌡 Hot deals (&gt;100°)</button>
          <button class="filter-btn" data-filter="favorite">★ Favorites only</button>
        </div>
      </div>

    </aside>

    <!-- MAIN -->
    <main>

      <!-- INDICATORS -->
      <div class="indicators-bar">
        <div class="indicator-card">
          <span class="label">Deals</span>
          <span class="value" id="nbDeals">—</span>
        </div>
        <div class="indicator-card">
          <span class="label">Vinted sales</span>
          <span class="value" id="nbSales">—</span>
        </div>
        <div class="indicator-card">
          <span class="label">Lifetime</span>
          <span class="value" id="lifetime">—</span>
        </div>
        <div class="indicator-card">
          <span class="label">Avg price</span>
          <span class="value" id="avgPrice">—</span>
        </div>
        <div class="indicator-card">
          <span class="label">P5 price</span>
          <span class="value" id="p5Price">—</span>
        </div>
        <div class="indicator-card">
          <span class="label">P25 price</span>
          <span class="value" id="p25Price">—</span>
        </div>
        <div class="indicator-card">
          <span class="label">P50 price</span>
          <span class="value" id="p50Price">—</span>
        </div>
      </div>

      <!-- VINTED SALES -->
      <div class="vinted-header">
        <h2>Vinted Sales</h2>
        <select id="lego-set-id-select" class="lego-id-select"></select>
      </div>
      <section id="vinted-sales"><p class="empty">Select a set id to load Vinted sales.</p></section>

      <hr class="section-divider">


      <!-- DEALS -->
      <section id="deals">
        <h2 class="deals-header">Deals</h2>
        <p class="empty">Loading deals…</p>
      </section>

      <!-- PAGINATION -->
      <div class="pagination">
        <button class="page-btn" id="prev-btn">← Previous</button>
        <div class="page-numbers" id="page-numbers"></div>
        <button class="page-btn" id="next-btn">Next →</button>
      </div>

    </main>
  </div>

  <script src="utils2.js"></script>
  <script src="portfolio2.js"></script>
</body>
</html>
